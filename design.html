<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ascension Festival — Design Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Montserrat+Alternates:wght@700;800;900&display=swap" rel="stylesheet" />

<!-- Pretix ticket widget -->
<link rel="stylesheet" type="text/css" href="https://tickets.ascensionfestival.nl/intro/widget/v2.css" crossorigin />
<script type="text/javascript" src="https://tickets.ascensionfestival.nl/widget/v2.en.js" async crossorigin></script>
<style>
  html, body { margin: 0; padding: 0; background: #15110e; font-family: 'Montserrat', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  /* Common placeholder photo helper used inside artboards */
  .af-photo {
    position: relative;
    background:
      linear-gradient(135deg, rgba(255,140,40,.10), rgba(180,40,20,.18) 60%, rgba(0,0,0,.55)),
      repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 8px, rgba(0,0,0,.06) 8px 16px),
      radial-gradient(120% 80% at 20% 20%, #3a1d0f 0%, #1a0e08 60%, #0b0604 100%);
    color: rgba(255,220,180,.55);
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    overflow: hidden;
  }
  .af-photo::after {
    content: attr(data-cap);
    position: absolute; left: 10px; bottom: 8px;
    color: rgba(255,220,180,.45);
    font-family: ui-monospace, Menlo, monospace; font-size: 9px;
    letter-spacing: .14em;
  }
  .af-photo .grain {
    position:absolute; inset:0; pointer-events:none; mix-blend-mode: overlay; opacity:.5;
    background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
    background-size: 3px 3px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="mono.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <window.DesignCanvas title="Ascension Festival" subtitle="Homepage, Tickets, Events, Gallery, Contact.">
        <window.DCSection id="homepage" title="Homepage" subtitle="Desktop + Mobile.">
          <window.DCArtboard id="mono" label="Home · Desktop" width={1280} height={3800}>
            <window.Monochrome />
          </window.DCArtboard>
          <window.DCArtboard id="mono-mobile" label="Home · Mobile" width={390} height={2200}>
            <window.MonochromeMobile />
          </window.DCArtboard>
        </window.DCSection>
        <window.DCSection id="pages" title="Pages" subtitle="Tickets · Events · Gallery · Contact.">
          <window.DCArtboard id="tickets" label="Tickets · Pretix embed" width={1280} height={1900}>
            <window.TicketsPage />
          </window.DCArtboard>
          <window.DCArtboard id="events" label="Events" width={1280} height={3600}>
            <window.EventsPage />
          </window.DCArtboard>
          <window.DCArtboard id="gallery" label="Gallery" width={1280} height={5200}>
            <window.GalleryPage />
          </window.DCArtboard>
          <window.DCArtboard id="contact" label="Contact" width={1280} height={2200}>
            <window.ContactPage />
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
